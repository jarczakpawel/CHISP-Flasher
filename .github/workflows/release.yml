name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_gui:
    name: Build GUI ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
          - os: windows-latest
            label: windows
          - os: macos-latest
            label: macos

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install Linux packaging tools and Qt runtime deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            rpm ruby ruby-dev build-essential fakeroot desktop-file-utils \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-render-util0 libxcb-shape0 libxcb-util1 libxcb-xkb1 \
            libxkbcommon-x11-0 libtiff6
          sudo gem install --no-document fpm

      - name: Install Windows packaging tools
        if: runner.os == 'Windows'
        run: choco install innosetup -y --no-progress

      - name: Install GUI build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pillow

      - name: Build GUI release package
        run: python scripts/build_release.py

      - name: Upload GUI build artifact
        uses: actions/upload-artifact@v6
        with:
          name: chisp-flasher-gui-${{ matrix.label }}
          path: dist/release/*
          if-no-files-found: error

  build_python_package:
    name: Build Python package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Build wheel and sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Upload Python package artifacts
        uses: actions/upload-artifact@v6
        with:
          name: chisp-flasher-python-package
          path: |
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error

  release:
    name: Create GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - build_gui
      - build_python_package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download GUI artifacts
        uses: actions/download-artifact@v6
        with:
          path: release-assets
          pattern: chisp-flasher-gui-*
          merge-multiple: true

      - name: Download Python package artifacts
        uses: actions/download-artifact@v6
        with:
          path: release-assets
          pattern: chisp-flasher-python-package
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
